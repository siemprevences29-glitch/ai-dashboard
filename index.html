<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AI Dashboard PRO</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6 bg-gray-100">

<h1 class="text-2xl font-bold mb-4">AI Dashboard PRO 🚀</h1>

<!-- FILTROS -->

<div class="flex gap-2 mb-4 flex-wrap" id="filters">
  <button onclick="filterCat('all')" class="filter-btn bg-black text-white px-3 py-1 rounded">Todo</button>
  <button onclick="filterCat('video')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Video</button>
  <button onclick="filterCat('imagen')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Imagen</button>
  <button onclick="filterCat('audio')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Audio</button>
  <button onclick="filterCat('dev')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Dev</button>
  <button onclick="filterCat('marketing')" class="filter-btn bg-gray-200 px-3 py-1 rounded">Marketing</button>
</div>

<!-- BUSCADOR -->

<input id="search" placeholder="¿Qué quieres hacer?" class="border p-2 w-full mb-4"/>

<!-- RECOMENDADOR -->

<div id="recommendation" class="mb-4 p-4 bg-white rounded shadow"></div>

<!-- RESULTADOS -->

<div id="results" class="grid gap-4 mb-6"></div>

<!-- FAVORITOS -->

<h2 class="text-xl font-bold mb-2">⭐ Favoritos</h2>
<div id="favorites" class="grid gap-2 mb-6"></div>

<!-- USO -->

<h2 class="text-xl font-bold mb-2">📊 Uso</h2>
<div id="usage" class="grid gap-2"></div>

<script>
let tools = [];
let favorites = JSON.parse(localStorage.getItem("fav")) || [];
let usage = JSON.parse(localStorage.getItem("use")) || {};
let currentCategory = "all";

// CARGAR JSON
fetch('tools.json')
  .then(res => res.json())
  .then(data => {
    tools = data;
    renderResults("");
  });

// ACTIVAR BOTÓN
function setActiveButton(cat){
  const buttons = document.querySelectorAll(".filter-btn");

  buttons.forEach(btn => {
    btn.classList.remove("bg-black","text-white");
    btn.classList.add("bg-gray-200");
  });

  const active = Array.from(buttons).find(b =>
    b.getAttribute("onclick").includes(cat)
  );

  if(active){
    active.classList.remove("bg-gray-200");
    active.classList.add("bg-black","text-white");
  }
}

// FILTRO
function filterCat(cat){
  currentCategory = cat;
  setActiveButton(cat);

  const q = document.getElementById("search").value.toLowerCase();
  renderResults(q);
}

// RECOMENDADOR
async function recommendAI(query) {
  query = query.toLowerCase();

  let scores = {};

  tools.forEach(tool => {
    let score = 0;

    tool.use.split(" ").forEach(k => {
      if(query.includes(k)) score += 2;
    });

    if(query.includes(tool.name.toLowerCase())) score += 3;

    if(score > 0){
      scores[tool.name] = score;
    }
  });

  const sorted = Object.entries(scores)
    .sort((a,b) => b[1] - a[1])
    .slice(0,5)
    .map(x => x[0]);

  return sorted.length ? sorted.join(" → ") : "ChatGPT → Perplexity";
}

// RENDER RESULTADOS
function renderResults(q = "") {

  const filtered = tools.filter(t => {

    const words = q.split(" ").filter(w => w.length > 2);

    const matchSearch =
      words.length === 0 ||
      words.some(word =>
        t.use.toLowerCase().includes(word) ||
        t.name.toLowerCase().includes(word)
      );

    const matchCat =
      currentCategory === "all" ||
      t.category === currentCategory;

    return matchSearch && matchCat;
  });

  document.getElementById("results").innerHTML = filtered.map(t => `
    <div class="border p-4 bg-white rounded shadow">
      <h2 class="font-bold">${t.name}</h2>
      <p class="text-sm text-gray-600">${t.desc || ""}</p>
      <div class="flex gap-2 mt-2">
        <a href="${t.url}" target="_blank">
          <button onclick="track('${t.name}')" class="bg-blue-500 text-white px-2 py-1 rounded">Abrir</button>
        </a>
        <button onclick="fav('${t.name}')" class="bg-yellow-400 px-2 py-1 rounded">⭐</button>
      </div>
    </div>
  `).join("");
}

// BUSCADOR
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  recommendAI(q).then(result => {
    document.getElementById("recommendation").innerHTML =
      `<b>🤖 Recomendación inteligente:</b> ${result}`;
  });

  renderResults(q);
});

// FAVORITOS
function fav(name){
  const tool = tools.find(t => t.name === name);

  if(!favorites.find(f => f.name === name)){
    favorites.push(tool);
  } else {
    favorites = favorites.filter(f => f.name !== name);
  }

  localStorage.setItem("fav", JSON.stringify(favorites));
  renderFavorites();
}

function renderFavorites(){
  document.getElementById("favorites").innerHTML = favorites.map(f => `
    <div class="p-2 bg-white rounded shadow">${f.name}</div>
  `).join("");
}

// USO
function track(name){
  usage[name] = (usage[name] || 0) + 1;
  localStorage.setItem("use", JSON.stringify(usage));
  renderUsage();
}

function renderUsage(){
  document.getElementById("usage").innerHTML = Object.entries(usage).map(([k,v]) => `
    <div class="p-2 bg-white rounded shadow">${k}: ${v}</div>
  `).join("");
}

// INICIAL
renderFavorites();
renderUsage();
</script>

</body>
</html>
