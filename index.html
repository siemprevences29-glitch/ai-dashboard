<!DOCTYPE html>

<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>AI Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-6">

<h1 class="text-2xl font-bold mb-4">AI Dashboard 🚀</h1>

<input id="search" placeholder="¿Qué quieres hacer?" class="border p-2 w-full mb-4"/>

<div id="results" class="grid gap-4"></div>

<script>
const tools = [
  { name: "ChatGPT", use: "ideas contenido codigo", url: "https://chat.openai.com" },
  { name: "Perplexity", use: "investigacion", url: "https://perplexity.ai" },
  { name: "Canva", use: "diseño marketing", url: "https://canva.com" },
  { name: "Runway", use: "video", url: "https://runwayml.com" },
  { name: "ElevenLabs", use: "voz audio", url: "https://elevenlabs.io" }
];

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const filtered = tools.filter(t => t.use.includes(q));
  
  document.getElementById("results").innerHTML = filtered.map(t => `
    <div class="border p-4">
      <h2 class="font-bold">${t.name}</h2>
      <a href="${t.url}" target="_blank" class="text-blue-500">Abrir</a>
    </div>
  `).join("");
});
</script>

</body>
</html>
